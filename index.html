<html lang="en">

  <meta charset="UTF-8" />

  <title>Python Data Science Setup Toolkit</title>
  <style>
    :root {
      --bg: #020617;
      --panel: #0f172a;
      --panel-2: #111827;
      --border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    .topbar {
      position: relative;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px clamp(16px, 3vw, 30px);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 30%),
        linear-gradient(135deg, #020617, #0f172a);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
    }

    .brand {
      min-width: 240px;
    }

    .brand h1 {
      margin: 0 0 4px;
      font-size: clamp(20px, 2.5vw, 30px);
      line-height: 1.1;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tab-button {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 800;
      cursor: pointer;
      color: var(--text);
      background: var(--panel-2);
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .tab-button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .tab-button.active {
      color: #020617;
      background: var(--accent);
      border-color: var(--accent);
    }

    .tab-button[data-tab="shortcuts"].active {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }

    .page-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 800;
      cursor: pointer;
      color: var(--text);
      background: var(--panel-2);
      text-decoration: none;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .page-link:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: #172033;
    }

    .content {
      position: relative;
      min-height: 0;
      background: #020617;
    }

    .panel {
      position: absolute;
      inset: 0;
      display: none;
      min-height: 0;
    }

    .panel.active {
      display: block;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #020617;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--muted);
      text-align: center;
      background: #020617;
    }

    .loading.hidden {
      display: none;
    }

    .noscript {
      margin: 24px;
      padding: 18px;
      border: 1px solid #f97316;
      border-radius: 12px;
      background: rgba(249, 115, 22, 0.1);
      color: #fed7aa;
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
      }

      .brand {
        width: 100%;
      }

      .tabs {
        width: 100%;
      }

      .tab-button {
        flex: 1 1 180px;
      }
    }
  </style>
</head>

    };

    const frames = {
      setup: document.getElementById("setup-frame"),
      shortcuts: document.getElementById("shortcuts-frame")
    };

    const loading = {
      setup: document.getElementById("setup-loading"),
      shortcuts: document.getElementById("shortcuts-loading")
    };

    const loaded = {
      setup: false,
      shortcuts: false
    };

    function loadTabContent(tabName) {
      if (loaded[tabName]) return;

      frames[tabName].addEventListener(
        "load",
        () => loading[tabName].classList.add("hidden"),
        { once: true }
      );

      frames[tabName].srcdoc = embeddedPages[tabName];
      loaded[tabName] = true;
    }

    function activateTab(tabName, updateHash = true) {
      document.querySelectorAll(".tab-button").forEach((button) => {
        const isActive = button.dataset.tab === tabName;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-selected", String(isActive));
      });

      document.querySelectorAll(".panel").forEach((panel) => {
        panel.classList.toggle("active", panel.id === `${tabName}-panel`);
      });

      loadTabContent(tabName);

      if (updateHash) {
        history.replaceState(null, "", `#${tabName}`);
      }

      document.title =
        tabName === "shortcuts"
          ? "Jupyter Shortcuts | Python Data Science Setup Toolkit"
          : "Project Setup Generator | Python Data Science Setup Toolkit";
    }

    document.querySelectorAll(".tab-button").forEach((button) => {
      button.addEventListener("click", () => activateTab(button.dataset.tab));
    });

    const initialTab = location.hash === "#shortcuts" ? "shortcuts" : "setup";
    loadTabContent("setup");
    activateTab(initialTab, false);

    window.addEventListener("hashchange", () => {
      activateTab(location.hash === "#shortcuts" ? "shortcuts" : "setup", false);
    });
  </script>
